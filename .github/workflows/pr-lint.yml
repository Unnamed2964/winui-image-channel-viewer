name: PR Checks

on:
  pull_request:
    paths:
      - '**/*.cpp'
      - '**/*.h'
      - '**/*.hpp'
      - '**/*.idl'
      - '**/*.xaml'
      - '.github/workflows/*.yml'
      - 'image_channel_viewer.vcxproj'
      - 'Package.appxmanifest'

jobs:
  lint-cpp-and-xaml:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format libxml2-utils

      - name: Collect changed files
        id: changed-files
        shell: bash
        run: |
          base_ref="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=1

          cpp_files=$(git diff --name-only "$base_ref...HEAD" -- '*.cpp' '*.h' '*.hpp' '*.idl' | tr '\n' ' ' | xargs)
          xaml_files=$(git diff --name-only "$base_ref...HEAD" -- '*.xaml' | tr '\n' ' ' | xargs)

          echo "cpp_files=$cpp_files" >> "$GITHUB_OUTPUT"
          echo "xaml_files=$xaml_files" >> "$GITHUB_OUTPUT"

      - name: Check C++ formatting
        if: ${{ steps.changed-files.outputs.cpp_files != '' }}
        shell: bash
        run: |
          for file in ${{ steps.changed-files.outputs.cpp_files }}; do
            echo "Checking $file"
            clang-format --dry-run --Werror --style=Microsoft "$file"
          done

      - name: Check XAML XML syntax
        if: ${{ steps.changed-files.outputs.xaml_files != '' }}
        shell: bash
        run: |
          for file in ${{ steps.changed-files.outputs.xaml_files }}; do
            echo "Checking $file"
            xmllint --noout "$file"
          done