name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-release:
    runs-on: windows-2025
    environment: "msix build necessary"
    permissions:
      contents: read
    env:
      MSIX_CERT_BASE64: ${{ secrets.MSIX_CERT_BASE64 }}
      MSIX_CERT_PASSWORD: ${{ secrets.MSIX_CERT_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x64
            asset_suffix: win-x64
            out_dir: artifacts/x64/
          - platform: x86
            asset_suffix: win-x86
            out_dir: artifacts/x86/
          - platform: ARM64
            asset_suffix: win-arm64
            out_dir: artifacts/arm64/

    steps:
      - name: Checkout repository
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@main

      - name: Restore signing certificate
        id: signing-cert
        if: env.MSIX_CERT_BASE64 != '' && env.MSIX_CERT_PASSWORD != ''
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP 'image_channel_viewer-signing.pfx'
          $certBytes = [System.Convert]::FromBase64String(($env:MSIX_CERT_BASE64 -replace '\s', ''))
          [System.IO.File]::WriteAllBytes($certPath, $certBytes)

          $securePassword = ConvertTo-SecureString -String $env:MSIX_CERT_PASSWORD -AsPlainText -Force
          $importedCert = Import-PfxCertificate -FilePath $certPath -Password $securePassword -CertStoreLocation Cert:\CurrentUser\My

          if ($null -eq $importedCert) {
            throw 'Import-PfxCertificate returned no certificate.'
          }

          if (-not $importedCert.HasPrivateKey) {
            throw 'The imported certificate does not contain a private key and cannot be used for MSIX signing.'
          }

          $codeSigningOid = '1.3.6.1.5.5.7.3.3'
          $hasCodeSigningEku = $false
          foreach ($extension in $importedCert.Extensions) {
            if ($extension.Oid.Value -ne '2.5.29.37') {
              continue
            }

            $enhancedKeyUsageExtension = [System.Security.Cryptography.X509Certificates.X509EnhancedKeyUsageExtension]$extension
            foreach ($oid in $enhancedKeyUsageExtension.EnhancedKeyUsages) {
              if ($oid.Value -eq $codeSigningOid) {
                $hasCodeSigningEku = $true
                break
              }
            }

            if ($hasCodeSigningEku) {
              break
            }
          }

          if (-not $hasCodeSigningEku) {
            throw "The imported certificate is not valid for code signing. Subject: $($importedCert.Subject)"
          }

          "cert_path=$certPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "thumbprint=$($importedCert.Thumbprint)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "subject=$($importedCert.Subject)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # help needed: we have no arm64 device to test whether arm64 build really works
      # message us if you have arm64 device and can help with testing arm64 build

      - name: Build Release ${{ matrix.platform }}
        shell: pwsh
        run: |
          $msbuildArgs = @(
            'image_channel_viewer.sln'
            '/restore'
            '/t:Build'
            '/p:Configuration=Release'
            '/p:Platform=${{ matrix.platform }}'
            '/p:GenerateAppxPackageOnBuild=true'
            '/p:UapAppxPackageBuildMode=SideloadOnly'
            '/p:AppxBundle=Never'
            '/p:AppxPackageDir=${{ github.workspace }}\${{ matrix.out_dir }}'
          )

          if ('${{ steps.signing-cert.outputs.thumbprint }}' -ne '') {
            $msbuildArgs += '/p:AppxPackageSigningEnabled=true'
            $msbuildArgs += '/p:PackageCertificateThumbprint=${{ steps.signing-cert.outputs.thumbprint }}'
            $msbuildArgs += '/p:PackageCertificateKeyFile='
            $msbuildArgs += '/p:PackageCertificatePassword='
          }
          else {
            $msbuildArgs += '/p:AppxPackageSigningEnabled=false'
          }

          & msbuild @msbuildArgs

      - name: Remove imported signing certificate
        if: always() && steps.signing-cert.outputs.thumbprint != ''
        shell: pwsh
        run: |
          $cert = Get-ChildItem Cert:\CurrentUser\My | Where-Object Thumbprint -eq '${{ steps.signing-cert.outputs.thumbprint }}'
          if ($null -ne $cert) {
            Remove-Item -Path $cert.PSPath -Force
          }

          $certPath = '${{ steps.signing-cert.outputs.cert_path }}'
          if ($certPath -and (Test-Path $certPath)) {
            Remove-Item $certPath -Force
          }

      - name: Package ${{ matrix.platform }} artifacts
        id: package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $outputDir = Join-Path $env:GITHUB_WORKSPACE "${{ matrix.out_dir }}"
          $assetName = "image_channel_viewer-$tag-${{ matrix.asset_suffix }}.zip"

          if (-not (Test-Path $outputDir)) {
            throw "Release output directory not found: $outputDir"
          }

          if (Test-Path $assetName) {
            Remove-Item $assetName -Force
          }

          Compress-Archive -Path "$outputDir/*" -DestinationPath $assetName
          "asset_path=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload packaged artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.asset_suffix }}
          path: ${{ steps.package.outputs.asset_path }}

  publish-release:
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@main
        with:
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@master
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/**/*.zip