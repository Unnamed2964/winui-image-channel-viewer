name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-release:
    runs-on: windows-2025
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x64
            asset_suffix: win-x64
            out_dir: artifacts/x64/
          - platform: x86
            asset_suffix: win-x86
            out_dir: artifacts/x86/
          - platform: ARM64
            asset_suffix: win-arm64
            out_dir: artifacts/arm64/

    steps:
      - name: Checkout repository
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@main

      # help needed: we have no arm64 device to test whether arm64 build really works
      # message us if you have arm64 device and can help with testing arm64 build

      - name: Build Release ${{ matrix.platform }}
        shell: pwsh
        run: >
          msbuild image_channel_viewer.sln
          /restore
          /t:Build
          /p:Configuration=Release
          /p:Platform=${{ matrix.platform }}
          /p:OutDir=${{ github.workspace }}\${{ matrix.out_dir }}

      - name: Package ${{ matrix.platform }} artifacts
        id: package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $outputDir = Join-Path $env:GITHUB_WORKSPACE "${{ matrix.out_dir }}"
          $assetName = "image_channel_viewer-$tag-${{ matrix.asset_suffix }}.zip"

          if (-not (Test-Path $outputDir)) {
            throw "Release output directory not found: $outputDir"
          }

          if (Test-Path $assetName) {
            Remove-Item $assetName -Force
          }

          Compress-Archive -Path "$outputDir/*" -DestinationPath $assetName
          "asset_path=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload packaged artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.asset_suffix }}
          path: ${{ steps.package.outputs.asset_path }}

  publish-release:
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@main
        with:
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@master
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/**/*.zip